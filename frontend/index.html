<!-- frontend/index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>AI Text Processor</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-size: 15px; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    #status { margin-top: 16px; color: #0f766e; font-weight: 600; }
    .hint { font-size: 0.95rem; color: #555; margin-top: -12px; }
  </style>
</head>
<body>
  <h2>AI Text Processor</h2>
  <label>Email</label>
  <input type="email" id="email" placeholder="student@example.com" />

  <label>Text</label>
  <textarea id="text" rows="6" placeholder="Paste your text here..."></textarea>

  <label>Website URL (optional)</label>
  <input type="url" id="url" placeholder="https://example.com/article" />
  <p class="hint">If a URL is provided, the backend will scrape paragraph text from the page and send it to n8n.</p>

  <button onclick="submitData()">Process</button>
  <p id="status"></p>

  <script>
    async function submitData() {
      const email = document.getElementById('email').value.trim();
      const text = document.getElementById('text').value.trim();
      const url = document.getElementById('url').value.trim();
      const status = document.getElementById('status');

      if (!email) {
        status.textContent = 'Please enter a valid email address.';
        return;
      }
      if (!text && !url) {
        status.textContent = 'Please enter text or a website URL.';
        return;
      }

      status.textContent = 'Processing...';
      const endpoint = url ? '/process-url' : '/process';
      const payload = url ? { email, url } : { email, text };

      try {
        const res = await fetch(`http://localhost:8000${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          status.textContent = `Error: ${data.detail || 'Request failed.'}`;
          return;
        }
        status.textContent = '✅ Done! Session: ' + data.session_id;
      } catch (error) {
        status.textContent = 'Network error: ' + error.message;
      }
    }
  </script>
</body>
</html>
